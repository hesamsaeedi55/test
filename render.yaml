services:
  - type: web
    name: myshop
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn myshop.wsgi:application --timeout 30 --workers 2"
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "myshop.onrender.com"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: myshop-db
          property: connectionString

databases:
  - name: myshop-db
    plan: free

